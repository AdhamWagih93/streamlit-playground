name: dashboard-ci

# Renders the CI/CD dashboard end-to-end against the local fake seam (fake
# Elasticsearch with seeded fixtures + fake vault + seeded local git) and
# captures a screenshot of every tab. No VPN, no Docker, no real services.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pytest pyyaml pandas playwright
          pip install "psycopg[binary]" || true

      - name: Compile check
        run: python -m py_compile cicd_dashboard.py cc_docchat.py

      - name: Seed local git + ES fixtures
        run: |
          python localdev/seed_git.py
          python localdev/seed_es_fixtures.py

      - name: Smoke test (render all admin tabs, fail on any exception)
        run: pytest localdev/test_smoke.py -q

      - name: Install Chromium for screenshots
        run: python -m playwright install --with-deps chromium

      - name: Capture screenshots of every tab
        run: python localdev/screenshot.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-screenshots
          path: localdev/screenshots/
          if-no-files-found: warn
