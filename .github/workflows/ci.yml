name: dashboard-ci

# Renders the CI/CD dashboard end-to-end against the local fake seam (fake ES +
# seeded fixtures + fake vault + seeded local git), screenshots every tab, and
# reports the result to Discord (set the DISCORD_WEBHOOK_URL repo secret — the
# same env var the jira/ci pipeline uses). No VPN / Docker / real services.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # A throwaway Postgres so the Teams + Architecture tabs show real data in
    # the screenshots (ldap_users / ldap_team_members). The harness works
    # without it too (those tabs just stay empty).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: devops
          POSTGRES_PASSWORD: devops
          POSTGRES_DB: devops
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      LOCALDEV_PG_HOST: localhost
      LOCALDEV_PG_PORT: "5432"
      LOCALDEV_PG_DB: devops
      LOCALDEV_PG_USER: devops
      LOCALDEV_PG_PASSWORD: devops
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Everything cicd_dashboard.py / cc_docchat.py hard-import at module load.
          pip install streamlit pytest pyyaml pandas numpy plotly requests playwright
          pip install "psycopg[binary]" || true

      - name: Install Chromium (for screenshots)
        run: python -m playwright install --with-deps chromium

      - name: Run dashboard CI (compile · seed · smoke · screenshots · Discord)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python localdev/run_ci.py

      - name: Upload screenshots + report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-ci-report
          path: |
            localdev/screenshots/
            localdev/ci_report/
          if-no-files-found: warn
