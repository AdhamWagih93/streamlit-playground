# Development overrides for Docker Compose
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Goal: keep the dev stack lighter by applying conservative CPU/memory limits.
# Note: resource limits are enforced by Docker Desktop / Docker Engine, but exact behavior can
# vary by platform and Compose version.

x-dev-resources-tiny: &dev_resources_tiny
  mem_limit: 96m
  cpus: 0.10

x-dev-resources-small: &dev_resources_small
  mem_limit: 192m
  cpus: 0.20

x-dev-resources-medium: &dev_resources_medium
  mem_limit: 384m
  cpus: 0.35

services:
  streamlit:
    <<: *dev_resources_medium
    build:
      cache_from:
        - bsw-streamlit:dev
    environment:
      - TZ=Africa/Cairo
      # Enable debug mode
      - DEBUG=true
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_RUN_ON_SAVE=true
      - STREAMLIT_SERVER_FILE_WATCHER_TYPE=watchdog

      # Disable Ollama by default in dev (save resources)
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
    volumes:
      # Additional dev mounts for config
      - ./best-streamlit-website/.streamlit:/app/.streamlit:cached
      - ./best-streamlit-website/assets:/app/assets:cached
    command: >
      sh -c "pip install watchdog &&
             python -m streamlit run app.py
             --server.address=0.0.0.0
             --server.port=8501
             --server.runOnSave=true
             --server.fileWatcherType=watchdog"

  scheduler:
    <<: *dev_resources_small
    environment:
      - TZ=Africa/Cairo
      # More frequent ticks in dev for testing
      - SCHEDULER_TICK_SECONDS=10
      # Auto-bootstrap demo jobs
      - SCHEDULER_BOOTSTRAP_JOBS=true
      - SCHEDULER_BOOTSTRAP_ALLOW_SHARED=true
      # Enable debug logging
      - LOG_LEVEL=DEBUG
    volumes:
      # Mount config files
      - ./best-streamlit-website/data:/app/data:delegated

  docker-mcp:
    <<: *dev_resources_tiny
    environment:
      - TZ=Africa/Cairo
      - MCP_CACHE_ENABLED=true
      - MCP_CACHE_BACKEND=redis
      - MCP_REDIS_HOST=redis
      - MCP_REDIS_PORT=6379
      - LOG_LEVEL=DEBUG
    # Expose additional ports for debugging
    ports:
      - "8001:8000"
      - "5678:5678"  # Python debugger port

  jenkins-mcp:
    <<: *dev_resources_tiny
    environment:
      - TZ=Africa/Cairo
      - MCP_CACHE_ENABLED=true
      - MCP_CACHE_BACKEND=redis
      - MCP_REDIS_HOST=redis
      - MCP_REDIS_PORT=6379
      - LOG_LEVEL=DEBUG
    ports:
      - "8002:8000"
      - "5679:5678"  # Python debugger port

  kubernetes-mcp:
    <<: *dev_resources_tiny
    environment:
      - TZ=Africa/Cairo
      - MCP_CACHE_ENABLED=true
      - MCP_CACHE_BACKEND=redis
      - MCP_REDIS_HOST=redis
      - MCP_REDIS_PORT=6379
      - LOG_LEVEL=DEBUG
    ports:
      - "8003:8000"
      - "5680:5678"  # Python debugger port

  local-mcp:
    <<: *dev_resources_tiny
    environment:
      - TZ=Africa/Cairo
      - MCP_CACHE_ENABLED=true
      - MCP_CACHE_BACKEND=redis
      - MCP_REDIS_HOST=redis
      - MCP_REDIS_PORT=6379
      - LOG_LEVEL=DEBUG
    ports:
      - "8009:8000"
      - "5681:5678"  # Python debugger port

  # These services exist in docker-compose.yml but aren't overridden above.
  # Add limits here so dev runs stay lighter.

  postgres:
    mem_limit: 256m
    cpus: 0.20

  redis:
    mem_limit: 64m
    cpus: 0.05

  git-mcp:
    <<: *dev_resources_tiny

  nexus-mcp:
    <<: *dev_resources_tiny

  websearch-mcp:
    <<: *dev_resources_tiny

  trivy-mcp:
    mem_limit: 256m
    cpus: 0.25
    # Tip: set TRIVY_SKIP_DB_UPDATE=true in your .env to avoid DB downloads in dev.

  playwright-mcp:
    mem_limit: 256m
    cpus: 0.25

  # Additional development service: Lightweight DB admin
  db-admin:
    <<: *dev_resources_tiny
    image: adminer:4
    container_name: bsw-db-admin
    ports:
      - "8090:8080"
    depends_on:
      - postgres
    networks:
      - bsw-network
    profiles:
      - tools
