services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: magento-app
    restart: unless-stopped
    volumes:
      - magento-code:/var/www/html
    environment:
      PHP_MEMORY_LIMIT: 2G
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks: [magento-net]

  nginx:
    image: nginx:1.25-alpine
    container_name: magento-nginx
    restart: unless-stopped
    ports:
      - "80:8080"
    volumes:
      - magento-code:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [magento-net]

  mysql:
    image: mysql:8.0
    container_name: magento-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --max_allowed_packet=256M
      - --innodb_buffer_pool_size=1G
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: magento
      MYSQL_USER: magento
      MYSQL_PASSWORD: magento
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks: [magento-net]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.29
    container_name: magento-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ulimits:
      memlock: { soft: -1, hard: -1 }
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks: [magento-net]

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: magento-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 256M
    ports:
      - "8080:80"
    depends_on: [mysql]
    networks: [magento-net]

volumes:
  magento-code:
  mysql-data:
  es-data:

networks:
  magento-net:
    driver: bridge
