upstream fastcgi_backend {
    server app:9000;
}

server {
    listen 8080;
    server_name _;

    set $MAGE_ROOT /var/www/html;
    set $MAGE_MODE production;

    root $MAGE_ROOT/pub;

    index index.php;
    autoindex off;
    charset UTF-8;
    client_max_body_size 256M;

    # Magento ships nginx.conf.sample at the repo root with all the location
    # rules. Pulling it in here keeps this file thin and upgrade-safe.
    include /var/www/html/nginx.conf.sample;
}
