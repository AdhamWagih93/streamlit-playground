{{- range $tier := list "backend" "frontend" }}
{{- $cfg := index $.Values $tier }}
{{- if $cfg.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "trackly.fullname" $ }}-{{ $tier }}
  labels:
    {{- include "trackly.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $tier }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "trackly.fullname" $ }}-{{ $tier }}
  minReplicas: {{ $cfg.autoscaling.minReplicas }}
  maxReplicas: {{ $cfg.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $cfg.autoscaling.targetCPUUtilizationPercentage }}
---
{{- end }}
{{- end }}
