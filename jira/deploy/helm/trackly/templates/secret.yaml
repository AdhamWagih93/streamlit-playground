{{- if .Values.secrets.create }}
{{- /*
  Resolve SECRET_KEY: explicit value wins; otherwise reuse the one already
  stored in this Secret (so upgrades don't rotate it and invalidate sessions /
  encrypted credentials); otherwise generate a fresh random key on first install.
*/ -}}
{{- $secretName := include "trackly.secretName" . -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
{{- $secretKey := .Values.secrets.secretKey -}}
{{- if not $secretKey -}}
  {{- if and $existing $existing.data (index $existing.data "SECRET_KEY") -}}
    {{- $secretKey = index $existing.data "SECRET_KEY" | b64dec -}}
  {{- else -}}
    {{- $secretKey = randAlphaNum 50 -}}
  {{- end -}}
{{- end -}}
{{- $pgPassword := .Values.postgresql.auth.password | default "trackly" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "trackly.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ $secretKey | quote }}
  POSTGRES_PASSWORD: {{ $pgPassword | quote }}
  BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.secrets.bootstrapAdminPassword | default "admin" | quote }}
{{- end }}
