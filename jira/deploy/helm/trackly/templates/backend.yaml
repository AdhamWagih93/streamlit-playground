{{- $be := include "trackly.backend.fullname" . -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $be }}
  labels:
    {{- include "trackly.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "trackly.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
---
{{- if and .Values.backend.persistence.enabled (not .Values.backend.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $be }}-attachments
  labels:
    {{- include "trackly.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  accessModes: ["{{ .Values.backend.persistence.accessMode }}"]
  resources:
    requests:
      storage: {{ .Values.backend.persistence.size }}
  {{- with .Values.backend.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $be }}
  labels:
    {{- include "trackly.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "trackly.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      annotations:
        # Roll pods when the env/secret change.
        checksum/config: {{ include (print $.Template.BasePath "/configmap-env.yaml") . | sha256sum }}
        {{- with .Values.backend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "trackly.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: {{ include "trackly.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: backend
          image: {{ include "trackly.backend.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "trackly.fullname" . }}-env
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "trackly.secretName" . }}
                  key: SECRET_KEY
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "trackly.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "trackly.secretName" . }}
                  key: BOOTSTRAP_ADMIN_PASSWORD
          readinessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /health, port: http}
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: attachments
              mountPath: {{ .Values.app.attachmentsDir }}
      volumes:
        - name: attachments
        {{- if .Values.backend.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.backend.persistence.existingClaim | default (printf "%s-attachments" $be) }}
        {{- else }}
          emptyDir: {}
        {{- end }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
