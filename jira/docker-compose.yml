name: trackly

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trackly}
      POSTGRES_USER: ${POSTGRES_USER:-trackly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trackly}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trackly} -d ${POSTGRES_DB:-trackly}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    environment:
      # Reach the db service over the compose network (overrides the
      # localhost default that .env carries for bare-metal dev).
      POSTGRES_HOST: db
      # DATABASE_URL would take precedence if set; leave it unset so the
      # discrete POSTGRES_* values (with POSTGRES_HOST=db) are used.
      ATTACHMENTS_DIR: /data/attachments
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - attachments:/data/attachments
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  # One-shot Jira -> Trackly migration runner. Lives behind the `migrate`
  # profile so it does NOT start with `docker compose up`.
  #
  #   docker compose run --rm migrator test-connection
  #   docker compose run --rm migrator list-projects
  #   docker compose run --rm migrator run --projects ENG
  migrator:
    build: ./backend
    env_file: .env
    environment:
      POSTGRES_HOST: db
      # JIRA_* values are passed through from .env via env_file; listed here
      # so the connection is explicit even if .env is sparse.
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_AUTH_MODE: ${JIRA_AUTH_MODE:-cloud}
      JIRA_PROJECT_KEYS: ${JIRA_PROJECT_KEYS:-}
      JIRA_JQL: ${JIRA_JQL:-}
      JIRA_VERIFY_SSL: ${JIRA_VERIFY_SSL:-true}
    depends_on:
      db:
        condition: service_healthy
    profiles: ["migrate"]
    entrypoint: ["python", "-m", "app.migration.cli"]
    command: ["run"]
    restart: "no"

volumes:
  pgdata:
  attachments:
