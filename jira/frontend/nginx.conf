# Trackly frontend — nginx serving the built SPA and proxying the API.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Attachments can be sizeable; allow larger uploads through the proxy.
    client_max_body_size 30m;

    # Gzip text assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy the API to the backend service (compose service name `backend`).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Preserve the bearer token for authenticated requests.
        proxy_set_header Authorization     $http_authorization;
        proxy_pass_request_headers on;
        proxy_read_timeout 120s;
    }

    # Backend liveness endpoint (used by uptime checks).
    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # SPA fallback — let the client-side router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
