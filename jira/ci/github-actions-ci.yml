name: Trackly CI

# Scoped to the Trackly subproject only: runs exclusively when files under jira/
# change (or when the workflow itself changes). Other projects in this repo are
# untouched. Each run produces a machine-readable report.json and a visual
# report.md (also rendered in the run's Summary tab), uploaded as artifacts.
on:
  push:
    branches: [main]
    paths:
      - 'jira/**'
      - '.github/workflows/trackly-ci.yml'
  pull_request:
    paths:
      - 'jira/**'
      - '.github/workflows/trackly-ci.yml'

concurrency:
  group: trackly-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend · lint & tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: trackly
          POSTGRES_USER: trackly
          POSTGRES_PASSWORD: trackly
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trackly"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: jira/backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: jira/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Byte-compile (syntax check)
        working-directory: jira/backend
        run: python -m compileall -q app

      - name: Run tests
        working-directory: jira/backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          POSTGRES_DB: trackly
          POSTGRES_USER: trackly
          POSTGRES_PASSWORD: trackly
          SECRET_KEY: ci-test-secret-key-0123456789abcdef0123456789
          APP_ENV: test
          DEBUG: 'false'
        run: |
          mkdir -p reports
          pytest -q \
            --junitxml=reports/junit.xml \
            --json-report --json-report-file=reports/pytest.json \
            --html=reports/pytest.html --self-contained-html \
            --cov=app --cov-report=json:reports/coverage.json --cov-report=term-missing

      - name: Generate report
        if: always()
        working-directory: jira/backend
        run: python ../ci/report.py backend --pytest reports/pytest.json --coverage reports/coverage.json --out-dir reports

      - name: Upload backend report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-report
          path: jira/backend/reports

  frontend:
    name: Frontend · typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: jira/frontend/package-lock.json

      - name: Install dependencies
        working-directory: jira/frontend
        run: npm ci

      - name: Build (tsc typecheck + vite bundle)
        working-directory: jira/frontend
        run: |
          mkdir -p reports
          npm run build 2>&1 | tee reports/build.log

      - name: Generate report
        if: always()
        working-directory: jira/frontend
        run: python3 ../ci/report.py frontend --dist dist --build-log reports/build.log --out-dir reports

      - name: Upload frontend report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-report
          path: jira/frontend/reports

  docker:
    name: Docker · compose & images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose
        working-directory: jira
        run: docker compose config >/dev/null

      - name: Build backend image
        working-directory: jira
        run: docker build -t trackly-backend:ci ./backend

      - name: Build frontend image
        working-directory: jira
        run: docker build -t trackly-frontend:ci ./frontend

      - name: Report (success)
        if: success()
        run: python3 jira/ci/report.py docker --status passed --out-dir jira/docker-reports

      - name: Report (failure)
        if: failure()
        run: python3 jira/ci/report.py docker --status failed --out-dir jira/docker-reports

      - name: Upload docker report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-report
          path: jira/docker-reports

  report:
    name: Consolidated report
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all job reports
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Consolidate report
        continue-on-error: true
        run: python3 jira/ci/report.py consolidate --in artifacts --out-dir ci-report

      - name: Upload consolidated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trackly-ci-report
          path: ci-report

      - name: Enforce overall status
        run: |
          python3 -c "import json,sys; s=json.load(open('ci-report/report.json'))['overall_status']; print('Overall:', s); sys.exit(0 if s=='passed' else 1)"
