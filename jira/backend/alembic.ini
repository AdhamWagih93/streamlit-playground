# Alembic configuration for Trackly.
#
# The database URL is intentionally NOT set here — alembic/env.py pulls it from
# the application settings (settings.sqlalchemy_database_uri) so there is a
# single source of truth shared with the running app.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Use OS-local time for migration filenames' timestamps.
timezone =

# Template used to generate migration file names.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

[post_write_hooks]
# (optional) auto-format generated migrations, e.g. with black/ruff:
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

# Logging configuration ------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
