apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: best-streamlit-website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
          command: ["redis-server", "--appendonly", "yes"]
          env:
            - name: TZ
              value: "Africa/Cairo"
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              cpu: 30m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: best-streamlit-website
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  type: ClusterIP
