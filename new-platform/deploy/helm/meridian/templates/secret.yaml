{{- if and (not .Values.existingSecret) .Values.secretEnv }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "meridian.fullname" . }}-secrets
  labels: {{- include "meridian.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secretEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
