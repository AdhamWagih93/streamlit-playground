{{- if .Values.gatewayApi.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "meridian.fullname" . }}
  labels: {{- include "meridian.labels" . | nindent 4 }}
  {{- with .Values.gatewayApi.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range .Values.gatewayApi.parentRefs }}
    - name: {{ .name }}
      {{- with .namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .sectionName }}
      sectionName: {{ . }}
      {{- end }}
    {{- end }}
  hostnames:
    {{- range .Values.gatewayApi.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    # SSE endpoints (AI analyze/chat/discover) need long-lived responses.
    - matches:
        - path:
            type: PathPrefix
            value: /api/ai
      timeouts:
        request: 0s            # disable request timeout for streams
      backendRefs:
        - name: {{ include "meridian.fullname" . }}
          port: {{ .Values.service.port }}
    # Everything else — SPA + API.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "meridian.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
