server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Directories resolve to their index.html (clean URLs like /demos/pulse/)
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Don't cache during a live talk — edits/refreshes always show the latest.
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header X-Demo "devops-2026";

    # Long-cache the web fonts only (they come from Google Fonts CDN anyway)
    location ~* \.(woff2?|ttf)$ { add_header Cache-Control "public, max-age=86400"; }

    error_page 404 /index.html;
}
