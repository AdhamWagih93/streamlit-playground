services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DEMO_MODE: ${QO_DEMO_MODE:-true}
      SECRET_KEY: ${QO_SECRET_KEY:-local-dev-secret}
      DATABASE_URL: ${QO_DATABASE_URL:-postgresql+psycopg2://questops:questops@db:5432/questops}
      # host Ollama by default (podman resolves host.containers.internal itself;
      # on plain docker set OLLAMA_URL=http://host.docker.internal:11434 in .env)
      # switch to http://ollama:11434 with `--profile ollama`
      OLLAMA_URL: ${QO_OLLAMA_URL:-http://host.containers.internal:11434}
      OLLAMA_MODEL: ${QO_OLLAMA_MODEL:-llama3.1}
      JIRA_BASE_URL: ${QO_JIRA_BASE_URL:-}
      JIRA_USER: ${QO_JIRA_USER:-}
      JIRA_PASSWORD: ${QO_JIRA_PASSWORD:-}
      JIRA_PROJECT_KEY: ${QO_JIRA_PROJECT_KEY:-DEVOPS}
      JIRA_BOARD_STATUSES: ${QO_JIRA_BOARD_STATUSES:-Open,In Progress,Resolved,Closed}
      JIRA_DONE_STATUSES: ${QO_JIRA_DONE_STATUSES:-Closed}
      JIRA_REVIEW_STATUSES: ${QO_JIRA_REVIEW_STATUSES:-Resolved}
      JIRA_REOPENED_STATUSES: ${QO_JIRA_REOPENED_STATUSES:-Reopened}
      JIRA_CLOSED_WINDOW_DAYS: ${QO_JIRA_CLOSED_WINDOW_DAYS:-30}
      JENKINS_URL: ${QO_JENKINS_URL:-}
      JENKINS_USER: ${QO_JENKINS_USER:-}
      JENKINS_TOKEN: ${QO_JENKINS_TOKEN:-}
      JENKINS_LONG_RUNNING_FACTOR: ${QO_JENKINS_LONG_RUNNING_FACTOR:-1.5}
      JENKINS_LONG_RUNNING_MINUTES: ${QO_JENKINS_LONG_RUNNING_MINUTES:-45}
      JENKINS_FAILURE_WINDOW_DAYS: ${QO_JENKINS_FAILURE_WINDOW_DAYS:-14}
      JENKINS_IGNORE: ${QO_JENKINS_IGNORE:-DevOps_Test}
      ES_URL: ${QO_ES_URL:-}
      ES_API_KEY: ${QO_ES_API_KEY:-}
      ES_VERIFY_SSL: ${QO_ES_VERIFY_SSL:-true}
      JENKINS_KPI_INDEX: ${QO_JENKINS_KPI_INDEX:-jenkins-kpi}
      ERROR_ANALYSIS_INDEX: ${QO_ERROR_ANALYSIS_INDEX:-jenkins-error-analysis}
      KPI_SYNC_MINUTES: ${QO_KPI_SYNC_MINUTES:-5,35}
      ERROR_ANALYSIS_DAYS: ${QO_ERROR_ANALYSIS_DAYS:-14}
      TZ: ${QO_TZ:-UTC}
      LDAP_URL: ${QO_LDAP_URL:-}
      LDAP_BIND_DN: ${QO_LDAP_BIND_DN:-}
      LDAP_BIND_PASSWORD: ${QO_LDAP_BIND_PASSWORD:-}
      LDAP_BASE_DN: ${QO_LDAP_BASE_DN:-}
      LDAP_USER_ATTR: ${QO_LDAP_USER_ATTR:-sAMAccountName}
      LDAP_REQUIRED_GROUP: ${QO_LDAP_REQUIRED_GROUP:-}
      LDAP_APPROVER_GROUP: ${QO_LDAP_APPROVER_GROUP:-}
      GIT_TOKEN: ${QO_GIT_TOKEN:-}
      GIT_USER_NAME: ${QO_GIT_USER_NAME:-questops-bot}
      GIT_USER_EMAIL: ${QO_GIT_USER_EMAIL:-questops-bot@local}
    # podman-compose doesn't honor healthcheck conditions reliably;
    # the app retries the DB connection on startup instead (db.init_db)
    depends_on:
      - db
    networks: [backend]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: questops
      POSTGRES_PASSWORD: questops
      POSTGRES_DB: questops
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U questops"]
      interval: 5s
      timeout: 3s
      retries: 10

  # optional in-compose Ollama:  docker compose --profile ollama up
  # then set OLLAMA_URL=http://ollama:11434
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    networks: [backend]

networks:
  backend: {}

volumes:
  pgdata:
  ollama:
