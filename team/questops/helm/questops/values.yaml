replicaCount: 1

image:
  repository: registry.mycorp.local/platform/questops
  tag: 0.1.0
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: nginx
  host: questops.mycorp.local
  tls: []
  annotations: {}

resources:
  requests: { cpu: 100m, memory: 256Mi }
  limits: { cpu: "1", memory: 512Mi }

app:
  demoMode: false
  # existing Secret with keys: SECRET_KEY, JIRA_PASSWORD, JENKINS_TOKEN,
  # LDAP_BIND_PASSWORD, GIT_TOKEN (and DATABASE_URL if database.url is empty).
  # Leave empty to render a Secret from the inline values below (not for prod).
  existingSecret: ""
  secretKey: "change-me"

ai:
  # your local / in-cluster Ollama — the values you said you'd configure
  ollamaUrl: "http://ollama.ai-tools.svc.cluster.local:11434"
  ollamaModel: "llama3.1"

jira:
  baseUrl: "https://jira.mycorp.local"
  projectKey: "DEVOPS"
  adminGroup: "jira-administrators"   # instance groups shown/cross-checked in Access
  usersGroup: "jira-users"
  boardStatuses: "Open,In Progress,Resolved,Closed"
  doneStatuses: "Closed"
  reviewStatuses: "Resolved"
  reopenedStatuses: "Reopened"
  closedWindowDays: 30
  user: "svc-questops"
  password: ""       # prefer app.existingSecret

jenkins:
  url: "https://jenkins.mycorp.local"
  user: "svc-questops"
  token: ""          # prefer app.existingSecret
  longRunningFactor: 1.5   # long-running = elapsed > job avg * factor
  longRunningMinutes: 45   # fallback for jobs with no build history
  failureWindowDays: 14
  ignore: "DevOps_Test"   # comma-separated path tokens to skip

elasticsearch:
  url: "https://es.mycorp.local:9200"
  apiKey: ""              # prefer app.existingSecret (key: ES_API_KEY)
  verifySsl: true
  kpiIndex: "jenkins-kpi"
  errorAnalysisIndex: "jenkins-error-analysis"
  kpiSyncMinutes: "5,35"  # loader schedule; countdown uses the pod TZ
  kpiMaxDocs: 10000       # KPI panel reads the whole window; per-request cap
  kpiDateFields: "builddate,@timestamp"  # doc field(s) holding the build time
  kpiIgnore: ""           # comma tokens; exclude matching job paths from KPIs
  errorAnalysisDays: 14

app_timezone: "UTC"       # TZ env for the pod (KPI countdown alignment)

# upgrade checker — the only outbound-internet calls; behind a corporate
# proxy set upgrades.proxy (internal integrations never use it). Latest
# versions come from Docker Hub / GitHub / Artifact Hub (not endoflife.date);
# point any base at an internal mirror if the public host is blocked.
upgrades:
  proxy: ""               # e.g. http://proxy.mycorp.local:8080
  verifySsl: true         # false if the proxy re-signs TLS
  dockerhubApiBase: "https://hub.docker.com/v2"
  githubApiBase: "https://api.github.com"
  artifacthubApiBase: "https://artifacthub.io/api/v1"

ldap:
  url: "ldaps://ldap.mycorp.local:636"
  bindDn: "CN=svc-questops,OU=Service Accounts,DC=mycorp,DC=local"
  bindPassword: ""   # prefer app.existingSecret
  baseDn: "OU=Users,DC=mycorp,DC=local"
  userAttr: "sAMAccountName"
  # these gate LOGIN only; [TEAM] members are resolved by the Engine repo's
  # scripts/Tools/LDAP/getTeamMembers.sh (see auth.ldap_group_members)
  requiredGroup: "CN=devops-team,OU=Groups,DC=mycorp,DC=local"
  # everyone in the group is an approver EXCEPT these usernames (comma-separated)
  memberUsernames: ""

git:
  token: ""          # prefer app.existingSecret
  userName: "questops-bot"
  userEmail: "questops-bot@mycorp.local"

repositories:
  workdir: /data/repos
  persistence:
    enabled: false   # true = PVC so clones/local edits survive restarts
    size: 5Gi
    storageClassName: ""

# repositories are ADDED FROM THE UI; only the ADO instance creds live here.
# git clone/pull uses user+password; the REST browse uses user+pat —
# leave one empty and the other is used for both.
ado:
  url: "https://ado.mycorp.local"   # INSTANCE root, not a collection
  user: "svc-questops"
  password: ""       # prefer app.existingSecret (key: ADO_PASSWORD)
  pat: ""            # prefer app.existingSecret (key: ADO_PAT)
  accessExclude: ""  # comma usernames excluded from repo-specific-access analysis

database:
  # external Postgres DSN, e.g. postgresql+psycopg2://user:pass@host:5432/questops
  url: ""
  # or run a tiny in-cluster Postgres (dev/small-team use)
  builtin:
    enabled: true
    image: postgres:16-alpine
    storage: 2Gi
    storageClassName: ""
    password: "questops"
