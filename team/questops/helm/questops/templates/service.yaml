apiVersion: v1
kind: Service
metadata:
  name: {{ include "questops.fullname" . }}
  labels:
    {{- include "questops.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "questops.selectorLabels" . | nindent 4 }}
